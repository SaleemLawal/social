services:
  db:
    image: postgres:17.1-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: social
    ports:
      - 5432:5432
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d social"]
      interval: 5s
      timeout: 3s
      retries: 10
  
  migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./cmd/migrate/migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://admin:adminpassword@db:5432/social?sslmode=disable"
      - "up"
    restart: "no"
  
  api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_URL: postgres://admin:adminpassword@db:5432/social?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  db-data:
